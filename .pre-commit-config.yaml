# 비밀키 커밋 차단 (CLAUDE.md §4 · §5 팀장 체크리스트)
#
# 설치 (팀원 각자 1회):
#   pip install -e ".[dev]"
#   pre-commit install
#
# 이후 git commit 때마다 자동 실행된다.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: detect-private-key        # .pem/.key 등 개인키 커밋 차단 — §4 핵심
      - id: check-added-large-files   # 코퍼스 DB·캐시 등 대용량 실수 커밋 방지
        args: ["--maxkb=500"]

  # 배포 토큰 차단. detect-private-key 는 개인키만 잡고 PyPI/GitHub 토큰은 못 잡는다.
  - repo: local
    hooks:
      - id: block-deploy-tokens
        name: 배포 토큰 커밋 차단 (PyPI·GitHub)
        entry: '(pypi-AgEIcHlwaS5vcmc|ghp_[A-Za-z0-9]{36}|github_pat_[A-Za-z0-9_]{22,})'
        language: pygrep
        types: [text]
        # 이 파일 자체엔 탐지용 패턴이 들어 있어 스스로를 잡는다 → 제외
        exclude: ^\.pre-commit-config\.yaml$
# ponytail: 더 넓은 비밀 탐지가 필요해지면 gitleaks 훅으로 교체한다.
